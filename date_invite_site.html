<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Встреча?</title>
  <style>
    :root {
      --bg1: #201127;
      --bg2: #52285d;
      --card: rgba(255, 245, 255, 0.92);
      --pink: #ff7abf;
      --purple: #9b5cff;
      --text: #2a1730;
      --muted: #7b617f;
      --border: rgba(137, 72, 150, .22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,122,191,.35), transparent 32%),
        radial-gradient(circle at bottom right, rgba(155,92,255,.35), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
    }

    .wrap {
      width: min(520px, 100%);
    }

    .lang {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .lang button, .choice, select, input, textarea, .send {
      border: 1px solid var(--border);
      border-radius: 18px;
      font: inherit;
    }

    .lang button {
      padding: 8px 16px;
      background: rgba(255,255,255,.18);
      color: white;
      cursor: pointer;
    }

    .lang button.active {
      background: white;
      color: #6c2b75;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 34px;
      padding: 30px 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,.28);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "♡";
      position: absolute;
      right: 22px;
      top: 10px;
      font-size: 62px;
      color: rgba(255,122,191,.16);
      transform: rotate(12deg);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 34px;
      line-height: 1.1;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 15px;
    }

    .step { display: none; animation: show .25s ease; }
    .step.active { display: block; }

    @keyframes show {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .question {
      font-size: 23px;
      text-align: center;
      margin: 8px 0 18px;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .two { grid-template-columns: 1fr 1fr; }
    .days { grid-template-columns: 1fr; }

    .choice {
      background: #fff;
      padding: 14px 16px;
      cursor: pointer;
      text-align: center;
      transition: .18s;
      min-height: 50px;
    }

    .choice:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(155,92,255,.16);
      border-color: rgba(255,122,191,.55);
    }

    .choice.selected {
      background: linear-gradient(135deg, #ffe1f2, #eee2ff);
      border-color: var(--pink);
      box-shadow: inset 0 0 0 1px rgba(255,122,191,.35);
    }

    .choice.busy {
      opacity: .58;
      cursor: not-allowed;
      background: #f5eef5;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      color: var(--muted);
      font-size: 14px;
    }

    select, input, textarea {
      width: 100%;
      padding: 14px 15px;
      background: white;
      color: var(--text);
      outline: none;
    }

    textarea { resize: vertical; min-height: 88px; }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 22px;
    }

    .back, .next, .send {
      padding: 13px 18px;
      border: 0;
      border-radius: 18px;
      cursor: pointer;
      font: inherit;
    }

    .back { background: #eee2ef; color: #57305f; }
    .next, .send {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: white;
      flex: 1;
    }

    .small {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .hidden { display: none; }

    @media (max-width: 420px) {
      h1 { font-size: 29px; }
      .card { padding: 26px 18px; border-radius: 28px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="lang">
      <button type="button" class="active" data-lang="ru">RU</button>
      <button type="button" data-lang="uz">UZ</button>
    </div>

    <form class="card" action="https://formspree.io/f/xdavnrgz" method="POST" id="inviteForm">
      <h1 data-i18n="title">Маленький вопрос</h1>
      <p class="subtitle" data-i18n="subtitle">без давления, просто красиво спрашиваю</p>

      <section class="step active" data-step="0">
        <div class="question" data-i18n="meet">Как насчёт встречи?</div>
        <div class="grid two">
          <button class="choice" type="button" data-name="answer" data-value="Да" data-next="1" data-i18n="yes">Да</button>
          <button class="choice" type="button" data-name="answer" data-value="Нет" data-next="no" data-i18n="no">Нет</button>
        </div>
        <input type="hidden" name="Ответ" id="answer" />
      </section>

      <section class="step" data-step="no">
        <div class="question" data-i18n="sad">Окей, я понял :(</div>
        <p class="small" data-i18n="sadText">Но форма всё равно может отправить мне ответ.</p>
        <input type="hidden" name="День" value="Не выбрано" />
        <input type="hidden" name="Время" value="Не выбрано" />
        <input type="hidden" name="Место" value="Не выбрано" />
        <button class="send" type="submit" data-i18n="send">Отправить форму :3</button>
      </section>

      <section class="step" data-step="1">
        <div class="question" data-i18n="when">Когда?</div>
        <div class="grid days">
          <button class="choice" type="button" data-name="day" data-value="Понедельник" data-next="2" data-i18n="mon">Понедельник</button>
          <button class="choice busy" type="button" disabled data-i18n="tue">Вторник — Занят :(</button>
          <button class="choice busy" type="button" disabled data-i18n="wed">Среда — Занят :(</button>
          <button class="choice" type="button" data-name="day" data-value="Четверг — хороший выбор" data-next="2" data-i18n="thu">Четверг — хороший выбор</button>
          <button class="choice" type="button" data-name="day" data-value="Пятница" data-next="2" data-i18n="fri">Пятница</button>
          <button class="choice" type="button" data-name="day" data-value="Суббота" data-next="2" data-i18n="sat">Суббота</button>
          <button class="choice" type="button" data-name="day" data-value="Воскресенье" data-next="2" data-i18n="sun">Воскресенье</button>
        </div>
        <input type="hidden" name="День" id="day" />
        <div class="nav"><button class="back" type="button" data-back="0" data-i18n="back">Назад</button></div>
      </section>

      <section class="step" data-step="2">
        <div class="question" data-i18n="time">Время?</div>
        <label for="time" data-i18n="chooseTime">Выбери час</label>
        <select name="Время" id="time" required></select>
        <div class="nav">
          <button class="back" type="button" data-back="1" data-i18n="back">Назад</button>
          <button class="next" type="button" data-go="3" data-i18n="next">Дальше</button>
        </div>
      </section>

      <section class="step" data-step="3">
        <div class="question" data-i18n="where">Куда?</div>
        <div class="grid">
          <button class="choice" type="button" data-name="place" data-value="Кофейня" data-i18n="coffee">Кофейня</button>
          <button class="choice" type="button" data-name="place" data-value="Парк" data-i18n="park">Парк</button>
          <button class="choice" type="button" data-name="place" data-value="Ресторан/Кафе" data-i18n="restaurant">Ресторан/Кафе</button>
          <button class="choice" type="button" data-name="place" data-value="Активные места" data-i18n="active">Активные места</button>
          <button class="choice" type="button" data-name="place" data-value="На свой выбор" id="ownBtn" data-i18n="own">На свой выбор</button>
        </div>
        <div id="ownBox" class="hidden">
          <label for="ownPlace" data-i18n="ownLabel">Свой вариант</label>
          <input name="Свой вариант" id="ownPlace" placeholder="Например: прогулка + кофе" />
        </div>
        <input type="hidden" name="Место" id="place" required />
        <div class="nav">
          <button class="back" type="button" data-back="2" data-i18n="back">Назад</button>
          <button class="send" type="submit" data-i18n="send">Отправить форму :3</button>
        </div>
      </section>

      <p class="small" data-i18n="note">Ответ придёт тебе на почту через Formspree.</p>
    </form>
  </main>

  <script>
    const dict = {
      ru: {
        title: 'Маленький вопрос', subtitle: 'без давления, просто красиво спрашиваю', meet: 'Как насчёт встречи?', yes: 'Да', no: 'Нет', sad: 'Окей, я понял :(', sadText: 'Но форма всё равно может отправить мне ответ.', when: 'Когда?', mon: 'Понедельник', tue: 'Вторник — Занят :(', wed: 'Среда — Занят :(', thu: 'Четверг — хороший выбор', fri: 'Пятница', sat: 'Суббота', sun: 'Воскресенье', time: 'Время?', chooseTime: 'Выбери час', where: 'Куда?', coffee: 'Кофейня', park: 'Парк', restaurant: 'Ресторан/Кафе', active: 'Активные места', own: 'На свой выбор', ownLabel: 'Свой вариант', back: 'Назад', next: 'Дальше', send: 'Отправить форму :3', note: 'Ответ придёт тебе на почту через Formspree.'
      },
      uz: {
        title: 'Kichkina savol', subtitle: 'bosimsiz, shunchaki chiroyli so‘rayapman', meet: 'Uchrashuvga nima deysan?', yes: 'Ha', no: 'Yo‘q', sad: 'Mayli, tushundim :(', sadText: 'Lekin javob baribir menga yuborilishi mumkin.', when: 'Qachon?', mon: 'Dushanba', tue: 'Seshanba — Band :(', wed: 'Chorshanba — Band :(', thu: 'Payshanba — yaxshi tanlov', fri: 'Juma', sat: 'Shanba', sun: 'Yakshanba', time: 'Vaqt?', chooseTime: 'Soatni tanla', where: 'Qayerga?', coffee: 'Qahvaxona', park: 'Park', restaurant: 'Restoran/Kafe', active: 'Faol joylar', own: 'O‘zi tanlasin', ownLabel: 'O‘z varianti', back: 'Orqaga', next: 'Keyingi', send: 'Formani yuborish :3', note: 'Javob senga Formspree orqali emailga keladi.'
      }
    };

    const steps = document.querySelectorAll('.step');
    const time = document.getElementById('time');
    const ownBox = document.getElementById('ownBox');
    let current = '0';

    for (let h = 8; h <= 21; h++) {
      const opt = document.createElement('option');
      opt.value = `${String(h).padStart(2, '0')}:00`;
      opt.textContent = opt.value;
      time.appendChild(opt);
    }

    function show(step) {
      current = String(step);
      steps.forEach(s => s.classList.toggle('active', s.dataset.step === current));
    }

    document.querySelectorAll('[data-name]').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.name);
        if (input) input.value = btn.dataset.value;
        document.querySelectorAll(`[data-name="${btn.dataset.name}"]`).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        if (btn.dataset.name === 'place') ownBox.classList.toggle('hidden', btn.id !== 'ownBtn');
        if (btn.dataset.next) show(btn.dataset.next);
      });
    });

    document.querySelectorAll('[data-go]').forEach(btn => btn.addEventListener('click', () => show(btn.dataset.go)));
    document.querySelectorAll('[data-back]').forEach(btn => btn.addEventListener('click', () => show(btn.dataset.back)));

    document.querySelectorAll('.lang button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.lang button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const lang = btn.dataset.lang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.dataset.i18n;
          if (dict[lang][key]) el.textContent = dict[lang][key];
        });
      });
    });

    document.getElementById('inviteForm').addEventListener('submit', e => {
      const answer = document.getElementById('answer').value;
      const place = document.getElementById('place').value;
      if (answer === 'Да' && !place) {
        e.preventDefault();
        alert('Выбери место :)');
      }
    });
  </script>
</body>
</html>
